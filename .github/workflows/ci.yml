name: CI

# Cross-platform build matrix:
#   OSes:      win32, macos, ios, android, ubuntu
#   Engines:   v8, jsc, chakra, quickjs
#   Graphics:  d3d11, d3d12, opengles, vulkan, metal
#
# Each surviving matrix cell builds the `app` executable (or `libdawntest.so`
# on Android), then uploads it as a workflow artifact named
# `app-<os>-<engine>-<graphics>`. A final `summary` job downloads every
# artifact and prints a size table.
#
# Engine availability:
#   * chakra — Windows only (ChakraCore NuGet)
#   * v8 — Windows only (Windows-x64 NuGet; cross-platform V8 not wired)
#   * quickjs — every OS (fetched + built from source via CMake)
#   * jsc — Apple (system framework) + Linux (libjavascriptcoregtk-4.1).
#           Windows and Android are not supported (no off-the-shelf JSC binary).
#
# Graphics availability:
#   * d3d11/d3d12 — Windows only
#   * metal — Apple only (macOS + iOS)
#   * vulkan — Windows, Linux, Android (no MoltenVK shim on macOS in this fork)
#   * opengles — Android only here (Win/macOS would need ANGLE; Linux would
#                need GLES headers wired)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

# Cancel superseded runs on the same branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # Windows: cmake + MSBuild.
  #   Engines: chakra, quickjs, v8 (jsc not available)
  #   Graphics: d3d11, d3d12, vulkan
  # ============================================================
  build-win32:
    name: win32 / ${{ matrix.engine }} / ${{ matrix.graphics }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        engine: [chakra, quickjs, v8, hermes]
        graphics: [d3d11, d3d12, vulkan, opengl]
    steps:
      - name: Enable Git long paths (Windows MAX_PATH workaround)
        shell: pwsh
        run: git config --global core.longpaths true

      - name: Checkout (no submodule recursion)
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Init the dawn submodule (top-level only)
        shell: pwsh
        run: |
          # Dawn pulls its own third-party deps via DAWN_FETCH_DEPENDENCIES.
          # Recursive submodule init fails because Dawn's submodules contain
          # private chrome-internal.googlesource.com refs.
          git submodule update --init dawn

      - name: Set up Python (Dawn build needs it)
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      # Chakra: linked against the legacy jsrt.h / Chakrart.lib that ship
      # with the Windows SDK on every windows-latest runner. No NuGet needed.

      - name: Configure
        shell: pwsh
        run: |
          $engineMap = @{
            'chakra'  = 'Chakra'
            'v8'      = 'V8'
            'quickjs' = 'QuickJS'
            'hermes'  = 'Hermes'
          }
          $gfxMap = @{
            'd3d11'  = 'D3D11'
            'd3d12'  = 'D3D12'
            'vulkan' = 'Vulkan'
            'opengl' = 'OpenGL'
          }
          $engine = $engineMap['${{ matrix.engine }}']
          $gfx    = $gfxMap['${{ matrix.graphics }}']
          Write-Host "engine=$engine gfx=$gfx"
          cmake -S . -B build `
            -G "Visual Studio 17 2022" -A x64 `
            "-DJS_ENGINE=$engine" `
            "-DGRAPHICS_API=$gfx"

      - name: Build
        shell: pwsh
        run: cmake --build build --config Release --target app -- /m

      - name: Locate executable
        id: locate
        shell: pwsh
        run: |
          $exe = Get-ChildItem build -Recurse -Filter app.exe | Sort-Object Length -Descending | Select-Object -First 1
          if (-not $exe) { throw "app.exe not found under build/" }
          $bytes = (Get-Item $exe.FullName).Length
          "exe=$($exe.FullName)" | Out-File -Append $env:GITHUB_OUTPUT
          "exedir=$($exe.Directory.FullName)" | Out-File -Append $env:GITHUB_OUTPUT
          "size_bytes=$bytes" | Out-File -Append $env:GITHUB_OUTPUT
          Write-Host ("size: {0} bytes ({1:N2} MB)" -f $bytes, ($bytes/1MB))

      - name: Upload artifact (exe only, for size summary)
        uses: actions/upload-artifact@v4
        with:
          name: app-win32-${{ matrix.engine }}-${{ matrix.graphics }}
          path: ${{ steps.locate.outputs.exe }}
          if-no-files-found: error
          retention-days: 14

      - name: Report complete deployable size (exe + JS engine + DLL deps)
        id: complete
        shell: pwsh
        run: |
          # "Complete size" = the executable plus every shared-library
          # dependency shipped alongside it (the JS engine DLL, Dawn, etc.).
          # For statically-linked engines (chakra via Windows SDK, quickjs,
          # hermes) this equals the exe; for V8 it also counts the bundled
          # v8 runtime DLLs. .js / asset files are excluded.
          $exedir = '${{ steps.locate.outputs.exedir }}'
          $exe    = Get-Item '${{ steps.locate.outputs.exe }}'
          $dlls   = Get-ChildItem $exedir -Filter *.dll -File -ErrorAction SilentlyContinue
          $total  = [int64]$exe.Length + (($dlls | Measure-Object Length -Sum).Sum)
          Write-Host ("complete: {0} bytes ({1:N2} MB)" -f $total, ($total/1MB))
          $dlls | Select-Object Name, Length | Format-Table -AutoSize
          $obj = [ordered]@{
            os = 'win32'; engine = '${{ matrix.engine }}'; graphics = '${{ matrix.graphics }}'
            app = 'dawntest'; exe_bytes = [int64]$exe.Length; total_bytes = [int64]$total
          }
          $obj | ConvertTo-Json | Out-File size.json -Encoding utf8

      - name: Upload complete-size marker
        uses: actions/upload-artifact@v4
        with:
          name: size-dawntest-win32-${{ matrix.engine }}-${{ matrix.graphics }}
          path: size.json
          if-no-files-found: error
          retention-days: 14

  # ============================================================
  # macOS: cmake + Ninja.
  #   Engines: quickjs, jsc
  #   Graphics: metal
  # ============================================================
  # NOTE: this fork currently has no src/framework/macos/, so the link
  # step is expected to fail (main.cpp + framework headers are Windows-only).
  # Job kept (continue-on-error) so the matrix demonstrates the intended
  # surface area; sizes for successful builds appear in the summary.
  build-macos:
    name: macos / ${{ matrix.engine }} / ${{ matrix.graphics }}
    runs-on: macos-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        engine: [quickjs, jsc]
        graphics: [metal]
    steps:
      - name: Checkout (no submodule recursion)
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Init the dawn submodule (top-level only)
        run: |
          # Dawn pulls its own third-party deps via DAWN_FETCH_DEPENDENCIES.
          # Recursive submodule init fails because Dawn's submodules contain
          # private chrome-internal.googlesource.com refs.
          git submodule update --init dawn

      - name: Set up Python (Dawn build needs it)
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Configure
        run: |
          engine="${{ matrix.engine }}"
          case "$engine" in
            quickjs) engine=QuickJS ;;
            jsc)     engine=JSC ;;
          esac
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DJS_ENGINE=$engine \
            -DGRAPHICS_API=Metal

      - name: Build
        run: cmake --build build --target app

      - name: Locate executable
        id: locate
        run: |
          exe=$(find build -type f -name app | head -1)
          if [ -z "$exe" ]; then echo "app not found"; exit 1; fi
          # Strip debug symbols so the reported size is comparable with the
          # BN Playground rows (which are also stripped) and with the
          # Android DawnTest row (Gradle stripReleaseDebugSymbols).
          strip -S "$exe" || true
          bytes=$(stat -f%z "$exe")
          echo "exe=$exe" >> "$GITHUB_OUTPUT"
          echo "size_bytes=$bytes" >> "$GITHUB_OUTPUT"
          printf "size: %s bytes (%.2f MB)\n" "$bytes" "$(echo "scale=2; $bytes/1048576" | bc)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-macos-${{ matrix.engine }}-${{ matrix.graphics }}
          path: ${{ steps.locate.outputs.exe }}
          if-no-files-found: error
          retention-days: 14

      - name: Report complete deployable size (exe + JS engine + dylib deps)
        run: |
          exe='${{ steps.locate.outputs.exe }}'
          dir=$(dirname "$exe")
          exe_bytes=$(stat -f%z "$exe")
          total=$exe_bytes
          # Sum any shared libraries shipped next to the binary (the JS engine
          # dylib etc.); statically-linked engines leave this empty so total==exe.
          while IFS= read -r lib; do
            [ -n "$lib" ] || continue
            total=$((total + $(stat -f%z "$lib")))
          done < <(find "$dir" -maxdepth 1 -type f -name '*.dylib')
          printf "complete: %s bytes (%.2f MB)\n" "$total" "$(echo "scale=2; $total/1048576" | bc)"
          printf '{"os":"macos","engine":"%s","graphics":"%s","app":"dawntest","exe_bytes":%s,"total_bytes":%s}\n' \
            "${{ matrix.engine }}" "${{ matrix.graphics }}" "$exe_bytes" "$total" > size.json

      - name: Upload complete-size marker
        uses: actions/upload-artifact@v4
        with:
          name: size-dawntest-macos-${{ matrix.engine }}-${{ matrix.graphics }}
          path: size.json
          if-no-files-found: error
          retention-days: 14

  # ============================================================
  # iOS: cmake + Xcode generator. Build only (no on-device test).
  #   Engines: quickjs, jsc
  #   Graphics: metal
  # ============================================================
  # NOTE: same caveat as macos — no src/framework/ios/ yet. Job marked
  # continue-on-error so it doesn't block the summary.
  build-ios:
    name: ios / ${{ matrix.engine }} / ${{ matrix.graphics }}
    runs-on: macos-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        engine: [quickjs, jsc]
        graphics: [metal]
    steps:
      - name: Checkout (no submodule recursion)
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Init the dawn submodule (top-level only)
        run: |
          # Dawn pulls its own third-party deps via DAWN_FETCH_DEPENDENCIES.
          # Recursive submodule init fails because Dawn's submodules contain
          # private chrome-internal.googlesource.com refs.
          git submodule update --init dawn

      - name: Set up Python (Dawn build needs it)
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Configure
        run: |
          engine="${{ matrix.engine }}"
          case "$engine" in
            quickjs) engine=QuickJS ;;
            jsc)     engine=JSC ;;
          esac
          # Use Ninja instead of Xcode: single-config, no per-platform
          # Release-iphoneos subdir that breaks Dawn's static lib lookup.
          # CMAKE_SYSTEM_NAME=iOS + CMAKE_OSX_SYSROOT=iphoneos selects the
          # iPhoneOS toolchain via clang's -isysroot.
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_SYSROOT=iphoneos \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=15.0 \
            -DCMAKE_BUILD_TYPE=Release \
            -DJS_ENGINE=$engine \
            -DGRAPHICS_API=Metal

      - name: Build
        run: cmake --build build --target app

      - name: Locate executable
        id: locate
        run: |
          exe=$(find build -type f -name app | head -1)
          if [ -z "$exe" ]; then echo "app not found"; exit 1; fi
          # Strip debug symbols so the reported size is comparable with the
          # BN Playground rows (which are also stripped).
          strip -S "$exe" || true
          bytes=$(stat -f%z "$exe")
          echo "exe=$exe" >> "$GITHUB_OUTPUT"
          echo "size_bytes=$bytes" >> "$GITHUB_OUTPUT"
          printf "size: %s bytes (%.2f MB)\n" "$bytes" "$(echo "scale=2; $bytes/1048576" | bc)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-ios-${{ matrix.engine }}-${{ matrix.graphics }}
          path: ${{ steps.locate.outputs.exe }}
          if-no-files-found: error
          retention-days: 14

      - name: Report complete deployable size (exe + JS engine + dylib deps)
        run: |
          exe='${{ steps.locate.outputs.exe }}'
          dir=$(dirname "$exe")
          exe_bytes=$(stat -f%z "$exe")
          total=$exe_bytes
          while IFS= read -r lib; do
            [ -n "$lib" ] || continue
            total=$((total + $(stat -f%z "$lib")))
          done < <(find "$dir" -maxdepth 1 -type f -name '*.dylib')
          printf "complete: %s bytes (%.2f MB)\n" "$total" "$(echo "scale=2; $total/1048576" | bc)"
          printf '{"os":"ios","engine":"%s","graphics":"%s","app":"dawntest","exe_bytes":%s,"total_bytes":%s}\n' \
            "${{ matrix.engine }}" "${{ matrix.graphics }}" "$exe_bytes" "$total" > size.json

      - name: Upload complete-size marker
        uses: actions/upload-artifact@v4
        with:
          name: size-dawntest-ios-${{ matrix.engine }}-${{ matrix.graphics }}
          path: size.json
          if-no-files-found: error
          retention-days: 14

  # ============================================================
  # Ubuntu: cmake + Ninja.
  #   Engines: quickjs, jsc
  #   Graphics: vulkan
  # ============================================================
  # NOTE: this fork currently has no src/framework/linux/, so the link
  # step is expected to fail. Kept with continue-on-error so the matrix
  # is honest about what builds end-to-end on each OS.
  build-ubuntu:
    name: ubuntu / ${{ matrix.engine }} / ${{ matrix.graphics }}
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        engine: [quickjs, jsc, hermes]
        graphics: [vulkan, opengl]
    steps:
      - name: Checkout (no submodule recursion)
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Init the dawn submodule (top-level only)
        run: |
          # Dawn pulls its own third-party deps via DAWN_FETCH_DEPENDENCIES.
          # Recursive submodule init fails because Dawn's submodules contain
          # private chrome-internal.googlesource.com refs.
          git submodule update --init dawn

      - name: Set up Python (Dawn build needs it)
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ninja-build cmake pkg-config \
            libx11-xcb-dev libxcb1-dev \
            libxkbcommon-dev libxkbcommon-x11-dev \
            libgl1-mesa-dev libwayland-dev mesa-common-dev
          if [ "${{ matrix.engine }}" = "jsc" ]; then
            sudo apt-get install -y --no-install-recommends libjavascriptcoregtk-4.1-dev || \
              sudo apt-get install -y --no-install-recommends libjavascriptcoregtk-4.0-dev
          fi

      - name: Configure
        run: |
          engine="${{ matrix.engine }}"
          case "$engine" in
            quickjs) engine=QuickJS ;;
            jsc)     engine=JSC ;;
            hermes)  engine=Hermes ;;
          esac
          gfx="${{ matrix.graphics }}"
          case "$gfx" in
            vulkan) gfx=Vulkan ;;
            opengl) gfx=OpenGL ;;
          esac
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DJS_ENGINE=$engine \
            -DGRAPHICS_API=$gfx

      - name: Build
        run: cmake --build build --target app

      - name: Locate executable
        id: locate
        run: |
          exe=$(find build -type f -name app -executable | head -1)
          if [ -z "$exe" ]; then echo "app not found"; exit 1; fi
          # Strip debug symbols so the reported size is comparable with the
          # BN Playground rows (which are also stripped).
          strip --strip-all "$exe" || true
          bytes=$(stat -c%s "$exe")
          echo "exe=$exe" >> "$GITHUB_OUTPUT"
          echo "size_bytes=$bytes" >> "$GITHUB_OUTPUT"
          printf "size: %s bytes (%.2f MB)\n" "$bytes" "$(echo "scale=2; $bytes/1048576" | bc)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-ubuntu-${{ matrix.engine }}-${{ matrix.graphics }}
          path: ${{ steps.locate.outputs.exe }}
          if-no-files-found: error
          retention-days: 14

      - name: Report complete deployable size (exe + JS engine + .so deps)
        run: |
          exe='${{ steps.locate.outputs.exe }}'
          dir=$(dirname "$exe")
          exe_bytes=$(stat -c%s "$exe")
          total=$exe_bytes
          # Sum bundled shared objects sitting next to the binary (the JS
          # engine .so etc.); system libs resolved via the loader are not
          # counted. Statically-linked engines leave this empty so total==exe.
          while IFS= read -r lib; do
            [ -n "$lib" ] || continue
            total=$((total + $(stat -c%s "$lib")))
          done < <(find "$dir" -maxdepth 1 -type f -name '*.so*')
          printf "complete: %s bytes (%.2f MB)\n" "$total" "$(echo "scale=2; $total/1048576" | bc)"
          printf '{"os":"ubuntu","engine":"%s","graphics":"%s","app":"dawntest","exe_bytes":%s,"total_bytes":%s}\n' \
            "${{ matrix.engine }}" "${{ matrix.graphics }}" "$exe_bytes" "$total" > size.json

      - name: Upload complete-size marker
        uses: actions/upload-artifact@v4
        with:
          name: size-dawntest-ubuntu-${{ matrix.engine }}-${{ matrix.graphics }}
          path: size.json
          if-no-files-found: error
          retention-days: 14

  # ============================================================
  # Android: Gradle :app:assembleRelease via the Android/ project.
  #   Engines: quickjs (V8 build for Android not wired; JSC same)
  #   Graphics: vulkan, opengles
  # ============================================================
  build-android:
    name: android / ${{ matrix.engine }} / ${{ matrix.graphics }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        engine: [quickjs, v8, hermes]
        graphics: [vulkan, opengles]
    steps:
      - name: Checkout (no submodule recursion)
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Init the dawn submodule (top-level only)
        run: |
          # Dawn pulls its own third-party deps via DAWN_FETCH_DEPENDENCIES.
          # Recursive submodule init fails because Dawn's submodules contain
          # private chrome-internal.googlesource.com refs.
          git submodule update --init dawn

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python (Dawn build needs it)
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Set up Node (for V8 npm package fetch)
        if: matrix.engine == 'v8'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Android SDK + NDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-34 build-tools;34.0.0 ndk;28.2.13676358 cmake;3.22.1"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.13"

      - name: Patch GRAPHICS_API in app/build.gradle.kts
        if: matrix.graphics != 'vulkan'
        run: |
          # On Android, "opengl" is an alias for OpenGLES (desktop GL doesn't exist);
          # we pass OpenGL through to CMake anyway and the root CMakeLists silently
          # remaps it so the matrix cell name lines up with the other OSes.
          case "${{ matrix.graphics }}" in
            opengles) newGfx=OpenGLES ;;
            opengl)   newGfx=OpenGL   ;;
          esac
          sed -i "s|\"-DGRAPHICS_API=Vulkan\"|\"-DGRAPHICS_API=$newGfx\"|" Android/app/build.gradle.kts

      - name: Patch JS_ENGINE in app/build.gradle.kts
        if: matrix.engine != 'quickjs'
        run: |
          case "${{ matrix.engine }}" in
            v8)     newEngine=V8     ;;
            hermes) newEngine=Hermes ;;
          esac
          sed -i "s|\"-DJS_ENGINE=QuickJS\"|\"-DJS_ENGINE=$newEngine\"|" Android/app/build.gradle.kts

      - name: Build host hermesc (Hermes only)
        if: matrix.engine == 'hermes'
        run: |
          # The Android NDK cross-build can't produce a runnable hermesc binary
          # (host x86_64 vs target arm64/x86_64-android). Build a native one
          # first, then point the cross-build at the generated
          # ImportHostCompilers.cmake file via -DIMPORT_HOST_COMPILERS.
          # (The variable was renamed from IMPORT_HERMESC on the static_h
          # branch; see hermes/doc/CrossCompilation.md.)
          mkdir -p hermes-host && cd hermes-host
          git clone --depth 1 --branch static_h https://github.com/facebook/hermes.git
          cmake -S hermes -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DHERMES_ENABLE_TOOLS=ON \
            -DHERMES_ENABLE_TEST_SUITE=OFF \
            -DHERMES_ENABLE_INTL=OFF \
            -DHERMES_ENABLE_DEBUGGER=OFF
          cmake --build build --target hermesc
          if [ ! -f build/ImportHostCompilers.cmake ]; then
            echo "ImportHostCompilers.cmake not produced — Hermes layout changed?"; exit 1
          fi
          echo "HERMESC_HOST=$(pwd)/build/ImportHostCompilers.cmake" >> "$GITHUB_ENV"

      - name: Pass hermesc path into Android Gradle (Hermes only)
        if: matrix.engine == 'hermes'
        run: |
          sed -i "s|\"-DJS_ENGINE=Hermes\"|\"-DJS_ENGINE=Hermes\", \"-DIMPORT_HOST_COMPILERS=${HERMESC_HOST}\"|" Android/app/build.gradle.kts

      - name: Build APK
        working-directory: Android
        run: |
          gradle --version
          gradle :app:assembleRelease --no-daemon --console=plain

      - name: Locate native .so (.apk gets reported separately)
        id: locate
        run: |
          # For the size summary we want the actual native lib size, not
          # the whole APK (which can be dominated by V8's 18 MB libv8android.so
          # — interesting but not what we built).
          so=$(find Android/app/build/intermediates/stripped_native_libs/release -type f -name 'libdawntest.so' | grep arm64-v8a | head -1)
          if [ -z "$so" ]; then echo "libdawntest.so not found"; exit 1; fi
          bytes=$(stat -c%s "$so")
          echo "exe=$so" >> "$GITHUB_OUTPUT"
          echo "size_bytes=$bytes" >> "$GITHUB_OUTPUT"
          printf "size: %s bytes (%.2f MB) — arm64-v8a stripped libdawntest.so\n" "$bytes" "$(echo "scale=2; $bytes/1048576" | bc)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-android-${{ matrix.engine }}-${{ matrix.graphics }}
          path: ${{ steps.locate.outputs.exe }}
          if-no-files-found: error
          retention-days: 14

      - name: Report complete deployable size (all arm64-v8a .so in the ABI)
        run: |
          # "Complete size per ABI" for Android = every native library packed
          # into the arm64-v8a slot of the APK: our libdawntest.so plus the JS
          # engine runtime (libv8android.so / libhermes*.so) and libc++_shared.so.
          # Read the final APK's lib/arm64-v8a/ entries directly — that is the
          # authoritative per-ABI payload (engine .so come from AARs merged at
          # packaging time, not from stripped_native_libs/).
          exe='${{ steps.locate.outputs.exe }}'
          exe_bytes=$(stat -c%s "$exe")
          apk=$(find Android/app/build/outputs/apk/release -type f -name '*.apk' | head -1)
          if [ -n "$apk" ]; then
            echo "--- $apk : lib/arm64-v8a/*.so ---"
            unzip -l "$apk" 'lib/arm64-v8a/*.so' || true
            total=$(unzip -l "$apk" 'lib/arm64-v8a/*.so' | grep '\.so$' | awk '{s+=$1} END{print s+0}')
          else
            echo "APK not found; falling back to stripped_native_libs sum"
            dir=$(dirname "$exe")
            total=$(find "$dir" -maxdepth 1 -type f -name '*.so' -exec stat -c%s {} \; | awk '{s+=$1} END{print s+0}')
          fi
          [ "${total:-0}" -gt 0 ] || total=$exe_bytes
          printf "complete: %s bytes (%.2f MB)\n" "$total" "$(echo "scale=2; $total/1048576" | bc)"
          printf '{"os":"android","engine":"%s","graphics":"%s","app":"dawntest","exe_bytes":%s,"total_bytes":%s}\n' \
            "${{ matrix.engine }}" "${{ matrix.graphics }}" "$exe_bytes" "$total" > size.json

      - name: Upload complete-size marker
        uses: actions/upload-artifact@v4
        with:
          name: size-dawntest-android-${{ matrix.engine }}-${{ matrix.graphics }}
          path: size.json
          if-no-files-found: error
          retention-days: 14


  #
  # For every non-Vulkan DawnTest cell we also build the upstream
  # BabylonNative `Playground` host so the size summary can show both
  # numbers side-by-side. Branch selection per JS engine:
  #   * quickjs → CedricGuillemet/BabylonNative @ quickjs
  #   * hermes  → CedricGuillemet/BabylonNative @ hermes-integration-dawn
  #   * other   → BabylonJS/BabylonNative @ master
  #
  # All cells: Release build, debug info stripped where applicable.
  # ============================================================

  # ---- Win32 ----
  build-bn-win32:
    name: bn / win32 / ${{ matrix.engine }} / ${{ matrix.graphics }}
    runs-on: windows-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        # No Vulkan (per user request) and no OpenGL (BN Win32 only supports
        # ANGLE-via-Chromium for GL, not viable in headless CI).
        engine: [chakra, v8, quickjs, hermes]
        graphics: [d3d11, d3d12]
    steps:
      - name: Enable Git long paths
        shell: pwsh
        run: git config --global core.longpaths true

      - name: Pick BabylonNative repo/branch for this engine
        id: bn
        shell: bash
        run: |
          case "${{ matrix.engine }}" in
            quickjs) echo "repo=CedricGuillemet/BabylonNative" >> "$GITHUB_OUTPUT"; echo "branch=quickjs" >> "$GITHUB_OUTPUT" ;;
            hermes)  echo "repo=CedricGuillemet/BabylonNative" >> "$GITHUB_OUTPUT"; echo "branch=hermes-integration-dawn" >> "$GITHUB_OUTPUT" ;;
            *)       echo "repo=BabylonJS/BabylonNative"        >> "$GITHUB_OUTPUT"; echo "branch=master"              >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Clone BabylonNative
        shell: pwsh
        run: git clone --depth 1 --branch ${{ steps.bn.outputs.branch }} https://github.com/${{ steps.bn.outputs.repo }}.git BabylonNative

      - name: Set up Node (for npm install of Apps/)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Configure
        shell: pwsh
        run: |
          $engineMap = @{
            'chakra'  = 'Chakra'
            'v8'      = 'V8'
            'quickjs' = 'QuickJS'
            'hermes'  = 'Hermes'
          }
          $gfxMap = @{
            'd3d11'  = 'D3D11'
            'd3d12'  = 'D3D12'
          }
          $engine = $engineMap['${{ matrix.engine }}']
          $gfx    = $gfxMap['${{ matrix.graphics }}']
          # Match DawnTest's MSVC size flags for an apples-to-apples size compare.
          # /wd4744 suppresses BN's latent trace_region std::atomic alignment
          # mismatch that only becomes visible under /GL link-time codegen.
          # The warning is real (implicit vs __declspec(align(4)) on
          # std::atomic<int> across TUs) but functionally harmless — both
          # layouts are identical on x64. BN turns warnings into errors via
          # BabylonJS/CMakeExtensions::warnings_as_errors() which adds /WX to
          # target compile options; that promotion carries through into /GL
          # link-time codegen as C2220 → LNK1257, so /wd4744 has to be set at
          # compile time (link-time /IGNORE: doesn't accept C4744 either).
          $cFlags = "/O1 /Ob2 /DNDEBUG /Gy /Gw /GL /Zc:inline /wd4744"
          $linkFlags = "/LTCG /OPT:REF /OPT:ICF /INCREMENTAL:NO /DEBUG:NONE"
          cmake -S BabylonNative -B BabylonNative/build `
            -G "Visual Studio 17 2022" -A x64 `
            "-DNAPI_JAVASCRIPT_ENGINE=$engine" `
            "-DGRAPHICS_API=$gfx" `
            "-DCMAKE_C_FLAGS_RELEASE=$cFlags" `
            "-DCMAKE_CXX_FLAGS_RELEASE=$cFlags" `
            "-DCMAKE_EXE_LINKER_FLAGS_RELEASE=$linkFlags" `
            "-DCMAKE_SHARED_LINKER_FLAGS_RELEASE=$linkFlags" `
            "-DCMAKE_STATIC_LINKER_FLAGS_RELEASE=/LTCG"

      - name: Build Playground (Release)
        shell: pwsh
        run: cmake --build BabylonNative/build --config Release --target Playground -- /m

      - name: Locate Playground.exe
        id: locate
        shell: pwsh
        run: |
          $exe = Get-ChildItem BabylonNative/build -Recurse -Filter Playground.exe | Sort-Object Length -Descending | Select-Object -First 1
          if (-not $exe) { throw "Playground.exe not found" }
          $bytes = (Get-Item $exe.FullName).Length
          "exe=$($exe.FullName)" | Out-File -Append $env:GITHUB_OUTPUT
          # Output dir holds Playground.exe + Scripts/ + runtime DLLs; needed
          # in full for the bench job since playground_runner.js is loaded
          # from app:///Scripts/ relative to cwd.
          "exedir=$($exe.Directory.FullName)" | Out-File -Append $env:GITHUB_OUTPUT
          "size_bytes=$bytes"    | Out-File -Append $env:GITHUB_OUTPUT
          Write-Host ("BN size: {0} bytes ({1:N2} MB)" -f $bytes, ($bytes/1MB))

      - name: Upload artifact (exe only, for size summary)
        uses: actions/upload-artifact@v4
        with:
          name: bn-playground-win32-${{ matrix.engine }}-${{ matrix.graphics }}
          path: ${{ steps.locate.outputs.exe }}
          if-no-files-found: error
          retention-days: 14

      - name: Report complete deployable size (exe + JS engine + DLL deps)
        id: complete
        shell: pwsh
        run: |
          # Complete size = Playground.exe plus every shipped DLL dependency
          # (the JS engine runtime, etc.). Scripts/ assets (.js/.png) excluded.
          $exedir = '${{ steps.locate.outputs.exedir }}'
          $exe    = Get-Item '${{ steps.locate.outputs.exe }}'
          $dlls   = Get-ChildItem $exedir -Filter *.dll -File -ErrorAction SilentlyContinue
          $total  = [int64]$exe.Length + (($dlls | Measure-Object Length -Sum).Sum)
          Write-Host ("complete: {0} bytes ({1:N2} MB)" -f $total, ($total/1MB))
          $dlls | Select-Object Name, Length | Format-Table -AutoSize
          $obj = [ordered]@{
            os = 'win32'; engine = '${{ matrix.engine }}'; graphics = '${{ matrix.graphics }}'
            app = 'bn'; exe_bytes = [int64]$exe.Length; total_bytes = [int64]$total
          }
          $obj | ConvertTo-Json | Out-File size.json -Encoding utf8

      - name: Upload complete-size marker
        uses: actions/upload-artifact@v4
        with:
          name: size-bn-win32-${{ matrix.engine }}-${{ matrix.graphics }}
          path: size.json
          if-no-files-found: error
          retention-days: 14

  # ---- macOS ----
  build-bn-macos:
    name: bn / macos / ${{ matrix.engine }} / ${{ matrix.graphics }}
    runs-on: macos-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        engine: [jsc, quickjs]
        graphics: [metal]
    steps:
      - name: Pick BabylonNative repo/branch for this engine
        id: bn
        run: |
          case "${{ matrix.engine }}" in
            quickjs) echo "repo=CedricGuillemet/BabylonNative" >> "$GITHUB_OUTPUT"; echo "branch=quickjs" >> "$GITHUB_OUTPUT" ;;
            *)       echo "repo=BabylonJS/BabylonNative"        >> "$GITHUB_OUTPUT"; echo "branch=master"  >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Clone BabylonNative
        run: git clone --depth 1 --branch ${{ steps.bn.outputs.branch }} https://github.com/${{ steps.bn.outputs.repo }}.git BabylonNative

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Configure
        run: |
          case "${{ matrix.engine }}" in
            jsc)     engine=JavaScriptCore ;;
            quickjs) engine=QuickJS        ;;
          esac
          # Match DawnTest's non-MSVC size flags for an apples-to-apples size compare.
          CFLAGS_REL="-O3 -DNDEBUG -Oz -ffunction-sections -fdata-sections -fvisibility=hidden"
          CXXFLAGS_REL="$CFLAGS_REL -fvisibility-inlines-hidden"
          LDFLAGS_REL="-Wl,-dead_strip"
          cmake -S BabylonNative -B BabylonNative/build/macOS \
            -G Xcode \
            -D NAPI_JAVASCRIPT_ENGINE=$engine \
            -D BABYLON_NATIVE_TESTS_USE_NOOP_METAL_DEVICE=ON \
            -D "CMAKE_C_FLAGS_RELEASE=$CFLAGS_REL" \
            -D "CMAKE_CXX_FLAGS_RELEASE=$CXXFLAGS_REL" \
            -D "CMAKE_EXE_LINKER_FLAGS_RELEASE=$LDFLAGS_REL" \
            -D "CMAKE_SHARED_LINKER_FLAGS_RELEASE=$LDFLAGS_REL" \
            -D CMAKE_INTERPROCEDURAL_OPTIMIZATION=ON

      - name: Build Playground (Release)
        run: |
          cmake --build BabylonNative/build/macOS --target Playground --config Release

      - name: Locate Playground.app, strip and report size
        id: locate
        run: |
          app=$(find BabylonNative/build/macOS -type d -name 'Playground.app' | head -1)
          if [ -z "$app" ]; then echo "Playground.app not found"; exit 1; fi
          bin="$app/Contents/MacOS/Playground"
          if [ -f "$bin" ]; then strip -S "$bin" || true; fi
          # Report the inner binary size (comparable with DawnTest's `app` Mach-O).
          bytes=$(stat -f%z "$bin")
          echo "exe=$bin" >> "$GITHUB_OUTPUT"
          echo "size_bytes=$bytes" >> "$GITHUB_OUTPUT"
          printf "BN size: %s bytes (%.2f MB)\n" "$bytes" "$(echo "scale=2; $bytes/1048576" | bc)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bn-playground-macos-${{ matrix.engine }}-${{ matrix.graphics }}
          path: ${{ steps.locate.outputs.exe }}
          if-no-files-found: error
          retention-days: 14

      - name: Report complete deployable size (binary + JS engine + dylib deps)
        run: |
          exe='${{ steps.locate.outputs.exe }}'
          # exe = Playground.app/Contents/MacOS/Playground -> bundle is 3 up.
          app=$(dirname "$(dirname "$(dirname "$exe")")")
          exe_bytes=$(stat -f%z "$exe")
          total=$exe_bytes
          # Add every dylib embedded in the .app (JS engine etc.); asset files
          # under Scripts/ are not .dylib so they're excluded.
          while IFS= read -r lib; do
            [ -n "$lib" ] || continue
            total=$((total + $(stat -f%z "$lib")))
          done < <(find "$app" -type f -name '*.dylib')
          printf "complete: %s bytes (%.2f MB)\n" "$total" "$(echo "scale=2; $total/1048576" | bc)"
          printf '{"os":"macos","engine":"%s","graphics":"%s","app":"bn","exe_bytes":%s,"total_bytes":%s}\n' \
            "${{ matrix.engine }}" "${{ matrix.graphics }}" "$exe_bytes" "$total" > size.json

      - name: Upload complete-size marker
        uses: actions/upload-artifact@v4
        with:
          name: size-bn-macos-${{ matrix.engine }}-${{ matrix.graphics }}
          path: size.json
          if-no-files-found: error
          retention-days: 14

  # ---- iOS ----
  build-bn-ios:
    name: bn / ios / ${{ matrix.engine }} / ${{ matrix.graphics }}
    runs-on: macos-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        engine: [jsc, quickjs]
        graphics: [metal]
    steps:
      - name: Pick BabylonNative repo/branch for this engine
        id: bn
        run: |
          case "${{ matrix.engine }}" in
            quickjs) echo "repo=CedricGuillemet/BabylonNative" >> "$GITHUB_OUTPUT"; echo "branch=quickjs" >> "$GITHUB_OUTPUT" ;;
            *)       echo "repo=BabylonJS/BabylonNative"        >> "$GITHUB_OUTPUT"; echo "branch=master"  >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Clone BabylonNative
        run: git clone --depth 1 --branch ${{ steps.bn.outputs.branch }} https://github.com/${{ steps.bn.outputs.repo }}.git BabylonNative

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Configure
        run: |
          case "${{ matrix.engine }}" in
            jsc)     engine=JavaScriptCore ;;
            quickjs) engine=QuickJS        ;;
          esac
          # Match upstream BN's iOS configure (ios-cmake toolchain via IOS=ON).
          # Match DawnTest's non-MSVC size flags for an apples-to-apples size compare.
          CFLAGS_REL="-O3 -DNDEBUG -Oz -ffunction-sections -fdata-sections -fvisibility=hidden"
          CXXFLAGS_REL="$CFLAGS_REL -fvisibility-inlines-hidden"
          LDFLAGS_REL="-Wl,-dead_strip"
          cmake -S BabylonNative -B BabylonNative/build/iOS \
            -G Xcode \
            -D IOS=ON \
            -D DEPLOYMENT_TARGET=15.0 \
            -D CMAKE_IOS_INSTALL_COMBINED=NO \
            -D NAPI_JAVASCRIPT_ENGINE=$engine \
            -D "CMAKE_C_FLAGS_RELEASE=$CFLAGS_REL" \
            -D "CMAKE_CXX_FLAGS_RELEASE=$CXXFLAGS_REL" \
            -D "CMAKE_EXE_LINKER_FLAGS_RELEASE=$LDFLAGS_REL" \
            -D "CMAKE_SHARED_LINKER_FLAGS_RELEASE=$LDFLAGS_REL" \
            -D CMAKE_INTERPROCEDURAL_OPTIMIZATION=ON

      - name: Build Playground (Release)
        run: |
          xcodebuild \
            -project BabylonNative/build/iOS/BabylonNative.xcodeproj \
            -scheme Playground \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO

      - name: Locate Playground.app and report size
        id: locate
        run: |
          app=$(find BabylonNative/build/iOS -type d -name 'Playground.app' | head -1)
          if [ -z "$app" ]; then echo "Playground.app not found"; exit 1; fi
          bin="$app/Playground"
          [ -f "$bin" ] || bin="$app/Contents/MacOS/Playground"
          if [ -f "$bin" ]; then strip -S "$bin" || true; fi
          bytes=$(stat -f%z "$bin")
          echo "exe=$bin" >> "$GITHUB_OUTPUT"
          echo "size_bytes=$bytes" >> "$GITHUB_OUTPUT"
          printf "BN size: %s bytes (%.2f MB)\n" "$bytes" "$(echo "scale=2; $bytes/1048576" | bc)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bn-playground-ios-${{ matrix.engine }}-${{ matrix.graphics }}
          path: ${{ steps.locate.outputs.exe }}
          if-no-files-found: error
          retention-days: 14

      - name: Report complete deployable size (binary + JS engine + dylib deps)
        run: |
          exe='${{ steps.locate.outputs.exe }}'
          app=$(dirname "$exe")
          case "$app" in */Contents/MacOS) app=$(dirname "$(dirname "$app")");; esac
          exe_bytes=$(stat -f%z "$exe")
          total=$exe_bytes
          while IFS= read -r lib; do
            [ -n "$lib" ] || continue
            total=$((total + $(stat -f%z "$lib")))
          done < <(find "$app" -type f -name '*.dylib')
          printf "complete: %s bytes (%.2f MB)\n" "$total" "$(echo "scale=2; $total/1048576" | bc)"
          printf '{"os":"ios","engine":"%s","graphics":"%s","app":"bn","exe_bytes":%s,"total_bytes":%s}\n' \
            "${{ matrix.engine }}" "${{ matrix.graphics }}" "$exe_bytes" "$total" > size.json

      - name: Upload complete-size marker
        uses: actions/upload-artifact@v4
        with:
          name: size-bn-ios-${{ matrix.engine }}-${{ matrix.graphics }}
          path: size.json
          if-no-files-found: error
          retention-days: 14

  # ---- Ubuntu ----
  build-bn-ubuntu:
    name: bn / ubuntu / ${{ matrix.engine }} / ${{ matrix.graphics }}
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        # No Vulkan (per user request). BN Linux supports OpenGL natively.
        engine: [jsc, quickjs, hermes]
        graphics: [opengl]
    steps:
      - name: Pick BabylonNative repo/branch for this engine
        id: bn
        run: |
          case "${{ matrix.engine }}" in
            quickjs) echo "repo=CedricGuillemet/BabylonNative" >> "$GITHUB_OUTPUT"; echo "branch=quickjs" >> "$GITHUB_OUTPUT" ;;
            hermes)  echo "repo=CedricGuillemet/BabylonNative" >> "$GITHUB_OUTPUT"; echo "branch=hermes-integration-dawn" >> "$GITHUB_OUTPUT" ;;
            *)       echo "repo=BabylonJS/BabylonNative"        >> "$GITHUB_OUTPUT"; echo "branch=master"  >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Clone BabylonNative
        run: git clone --depth 1 --branch ${{ steps.bn.outputs.branch }} https://github.com/${{ steps.bn.outputs.repo }}.git BabylonNative

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ninja-build cmake pkg-config clang \
            libjavascriptcoregtk-4.1-dev \
            libgl1-mesa-dev libcurl4-openssl-dev libwayland-dev \
            libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev

      - name: Configure
        env:
          CC: clang
          CXX: clang++
        run: |
          case "${{ matrix.engine }}" in
            jsc)     engine=JavaScriptCore ;;
            quickjs) engine=QuickJS        ;;
            hermes)  engine=Hermes         ;;
          esac
          # Match DawnTest's non-MSVC size flags for an apples-to-apples size compare.
          # Ubuntu BN job runs under clang (CC=clang above), so -Oz is valid.
          CFLAGS_REL="-O3 -DNDEBUG -Oz -ffunction-sections -fdata-sections -fvisibility=hidden"
          CXXFLAGS_REL="$CFLAGS_REL -fvisibility-inlines-hidden"
          LDFLAGS_REL="-Wl,--gc-sections"
          cmake -S BabylonNative -B BabylonNative/build/Linux \
            -G Ninja \
            -D CMAKE_BUILD_TYPE=Release \
            -D NAPI_JAVASCRIPT_ENGINE=$engine \
            -D JAVASCRIPTCORE_LIBRARY=/usr/lib/x86_64-linux-gnu/libjavascriptcoregtk-4.1.so \
            -D OpenGL_GL_PREFERENCE=GLVND \
            -D GRAPHICS_API=OpenGL \
            -D "CMAKE_C_FLAGS_RELEASE=$CFLAGS_REL" \
            -D "CMAKE_CXX_FLAGS_RELEASE=$CXXFLAGS_REL" \
            -D "CMAKE_EXE_LINKER_FLAGS_RELEASE=$LDFLAGS_REL" \
            -D "CMAKE_SHARED_LINKER_FLAGS_RELEASE=$LDFLAGS_REL" \
            -D CMAKE_INTERPROCEDURAL_OPTIMIZATION=ON

      - name: Build Playground (Release)
        run: cmake --build BabylonNative/build/Linux --target Playground

      - name: Locate, strip and report size
        id: locate
        run: |
          exe=$(find BabylonNative/build/Linux -type f -name Playground -executable | head -1)
          if [ -z "$exe" ]; then echo "Playground not found"; exit 1; fi
          strip --strip-all "$exe" || true
          bytes=$(stat -c%s "$exe")
          echo "exe=$exe" >> "$GITHUB_OUTPUT"
          echo "size_bytes=$bytes" >> "$GITHUB_OUTPUT"
          printf "BN size: %s bytes (%.2f MB)\n" "$bytes" "$(echo "scale=2; $bytes/1048576" | bc)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bn-playground-ubuntu-${{ matrix.engine }}-${{ matrix.graphics }}
          path: ${{ steps.locate.outputs.exe }}
          if-no-files-found: error
          retention-days: 14

      - name: Report complete deployable size (exe + JS engine + .so deps)
        run: |
          exe='${{ steps.locate.outputs.exe }}'
          dir=$(dirname "$exe")
          exe_bytes=$(stat -c%s "$exe")
          total=$exe_bytes
          while IFS= read -r lib; do
            [ -n "$lib" ] || continue
            total=$((total + $(stat -c%s "$lib")))
          done < <(find "$dir" -maxdepth 1 -type f -name '*.so*')
          printf "complete: %s bytes (%.2f MB)\n" "$total" "$(echo "scale=2; $total/1048576" | bc)"
          printf '{"os":"ubuntu","engine":"%s","graphics":"%s","app":"bn","exe_bytes":%s,"total_bytes":%s}\n' \
            "${{ matrix.engine }}" "${{ matrix.graphics }}" "$exe_bytes" "$total" > size.json

      - name: Upload complete-size marker
        uses: actions/upload-artifact@v4
        with:
          name: size-bn-ubuntu-${{ matrix.engine }}-${{ matrix.graphics }}
          path: size.json
          if-no-files-found: error
          retention-days: 14

  # ---- Android ----
  build-bn-android:
    name: bn / android / ${{ matrix.engine }} / ${{ matrix.graphics }}
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        # No Vulkan (per user request). On Android the BN graphics API is
        # always GL ES under the hood; only one row is emitted (opengles),
        # since DawnTest's "opengl" Android variant was removed as a
        # duplicate of "opengles".
        engine: [quickjs, v8, hermes]
        graphics: [opengles]
    steps:
      - name: Pick BabylonNative repo/branch for this engine
        id: bn
        run: |
          case "${{ matrix.engine }}" in
            quickjs) echo "repo=CedricGuillemet/BabylonNative" >> "$GITHUB_OUTPUT"; echo "branch=quickjs" >> "$GITHUB_OUTPUT" ;;
            hermes)  echo "repo=CedricGuillemet/BabylonNative" >> "$GITHUB_OUTPUT"; echo "branch=hermes-integration-dawn" >> "$GITHUB_OUTPUT" ;;
            *)       echo "repo=BabylonJS/BabylonNative"        >> "$GITHUB_OUTPUT"; echo "branch=master"  >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Clone BabylonNative
        run: git clone --depth 1 --branch ${{ steps.bn.outputs.branch }} https://github.com/${{ steps.bn.outputs.repo }}.git BabylonNative

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Android SDK + NDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-34 build-tools;34.0.0 ndk;28.2.13676358 cmake;3.22.1"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.13"

      - name: npm install (Apps/) — required for copyFiles task
        working-directory: BabylonNative/Apps
        run: npm install --no-audit --no-fund --no-progress

      - name: Inject size-parity flags into BN Android CMake args
        run: |
          # Mirror DawnTest's non-MSVC size flags (NDK Clang understands -Oz) so
          # the Android comparison is apples-to-apples. Set both RELEASE and
          # RELWITHDEBINFO variants because AGP's exact build-type choice for
          # `assembleRelease` has varied across versions.
          #
          # NOTE: CMAKE_INTERPROCEDURAL_OPTIMIZATION=ON is intentionally NOT
          # added here even though DawnTest's Android build uses it. BN pulls
          # in quickjs-ng (for quickjs) and Hermes (for hermes), both of which
          # explicitly pass `-fuse-ld=gold` to some of their helper executables
          # (lre-test, count). Combined with `-flto=thin` (which IPO=ON adds),
          # ld.gold needs LLVMgold.so to handle aarch64 LTO bitcode — and the
          # NDK r28 prebuilt toolchain doesn't ship LLVMgold.so. The link then
          # fails with "could not load plugin library: LLVMgold.so" before any
          # of our flags can take effect. DawnTest doesn't see this because it
          # uses Cedric's QuickJS fork (no `-fuse-ld=gold`). Dropping IPO loses
          # the LTO size win on Android-BN but everything else (-Oz, visibility,
          # gc-sections) still applies.
          sed -i 's|"-DBABYLON_DEBUG_TRACE=ON"|"-DBABYLON_DEBUG_TRACE=ON",\n                    "-DCMAKE_C_FLAGS_RELEASE=-O3 -DNDEBUG -Oz -ffunction-sections -fdata-sections -fvisibility=hidden",\n                    "-DCMAKE_CXX_FLAGS_RELEASE=-O3 -DNDEBUG -Oz -ffunction-sections -fdata-sections -fvisibility=hidden -fvisibility-inlines-hidden",\n                    "-DCMAKE_C_FLAGS_RELWITHDEBINFO=-O3 -DNDEBUG -Oz -ffunction-sections -fdata-sections -fvisibility=hidden",\n                    "-DCMAKE_CXX_FLAGS_RELWITHDEBINFO=-O3 -DNDEBUG -Oz -ffunction-sections -fdata-sections -fvisibility=hidden -fvisibility-inlines-hidden",\n                    "-DCMAKE_SHARED_LINKER_FLAGS_RELEASE=-Wl,--gc-sections",\n                    "-DCMAKE_SHARED_LINKER_FLAGS_RELWITHDEBINFO=-Wl,--gc-sections"|' BabylonNative/Apps/Playground/Android/BabylonNative/build.gradle
          # Show the resulting arguments block for CI debugging.
          sed -n '/externalNativeBuild {/,/^        }$/p' BabylonNative/Apps/Playground/Android/BabylonNative/build.gradle | head -40

      - name: Build host hermesc (Hermes only)
        if: matrix.engine == 'hermes'
        run: |
          mkdir -p hermes-host && cd hermes-host
          git clone --depth 1 --branch static_h https://github.com/facebook/hermes.git
          cmake -S hermes -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DHERMES_ENABLE_TOOLS=ON \
            -DHERMES_ENABLE_TEST_SUITE=OFF \
            -DHERMES_ENABLE_INTL=OFF \
            -DHERMES_ENABLE_DEBUGGER=OFF
          cmake --build build --target hermesc
          if [ ! -f build/ImportHostCompilers.cmake ]; then
            echo "ImportHostCompilers.cmake not produced"; exit 1
          fi
          echo "HERMESC_HOST=$(pwd)/build/ImportHostCompilers.cmake" >> "$GITHUB_ENV"

      - name: Inject IMPORT_HOST_COMPILERS into BN Android CMake args (Hermes only)
        if: matrix.engine == 'hermes'
        run: |
          # Append the host-compiler import file to the externalNativeBuild
          # cmake arguments block in the BN library gradle file.
          sed -i 's|"-DBABYLON_DEBUG_TRACE=ON"|"-DBABYLON_DEBUG_TRACE=ON",\n                    "-DIMPORT_HOST_COMPILERS='"$HERMESC_HOST"'"|' BabylonNative/Apps/Playground/Android/BabylonNative/build.gradle

      - name: Map matrix graphics → BN GRAPHICS_API
        id: gfx
        run: |
          case "${{ matrix.graphics }}" in
            opengles) echo "value=OpenGL" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Map matrix engine → BN jsEngine
        id: engine
        run: |
          case "${{ matrix.engine }}" in
            v8)      echo "value=V8"      >> "$GITHUB_OUTPUT" ;;
            quickjs) echo "value=QuickJS" >> "$GITHUB_OUTPUT" ;;
            hermes)  echo "value=Hermes"  >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Build APK
        working-directory: BabylonNative/Apps/Playground/Android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            -PjsEngine=${{ steps.engine.outputs.value }} \
            -PGRAPHICS_API=${{ steps.gfx.outputs.value }} \
            -PARM64Only \
            -PNDK_VERSION=28.2.13676358 \
            --no-daemon --console=plain

      - name: Locate native .so (arm64-v8a, stripped)
        id: locate
        run: |
          # The Playground Android module names its BN-linked JNI library
          # `libBabylonNativeJNI.so` (see
          # Apps/Playground/Android/BabylonNative/CMakeLists.txt).  Target it
          # by name — selecting the "largest .so" picked up unrelated runtime
          # libraries (libc++_shared.so for V8 builds, libhermesvmlean.so for
          # Hermes builds) instead of the BN core that we actually built.
          base=BabylonNative/Apps/Playground/Android
          echo "--- all arm64-v8a .so candidates (size, path) ---"
          find "$base" -type f -name '*.so' -path '*arm64-v8a*' \
            -exec stat -c '%s %n' {} \; | sort -nr || true
          echo "--- end candidates ---"
          # Prefer the stripped, release-built copy if available.
          so=$(find "$base" -type f -name 'libBabylonNativeJNI.so' -path '*arm64-v8a*' -path '*stripped_native_libs*' | head -1)
          if [ -z "$so" ]; then
            so=$(find "$base" -type f -name 'libBabylonNativeJNI.so' -path '*arm64-v8a*' | head -1)
          fi
          if [ -z "$so" ]; then echo "libBabylonNativeJNI.so not found"; exit 1; fi
          bytes=$(stat -c%s "$so")
          echo "exe=$so" >> "$GITHUB_OUTPUT"
          echo "size_bytes=$bytes" >> "$GITHUB_OUTPUT"
          printf "BN size: %s bytes (%.2f MB) — %s\n" "$bytes" "$(echo "scale=2; $bytes/1048576" | bc)" "$(basename "$so")"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bn-playground-android-${{ matrix.engine }}-${{ matrix.graphics }}
          path: ${{ steps.locate.outputs.exe }}
          if-no-files-found: error
          retention-days: 14

      - name: Report complete deployable size (all arm64-v8a .so in the ABI)
        run: |
          # Complete size per ABI = every native library packed into the
          # arm64-v8a slot of the Playground APK: libBabylonNativeJNI.so plus
          # the JS engine runtime (libv8android.so / libhermes*.so) and
          # libc++_shared.so. Read the APK's lib/arm64-v8a/ entries directly.
          base=BabylonNative/Apps/Playground/Android
          exe='${{ steps.locate.outputs.exe }}'
          exe_bytes=$(stat -c%s "$exe")
          apk=$(find "$base" -type f -name '*-release*.apk' | head -1)
          [ -n "$apk" ] || apk=$(find "$base" -path '*outputs/apk/release*' -name '*.apk' | head -1)
          if [ -n "$apk" ]; then
            echo "--- $apk : lib/arm64-v8a/*.so ---"
            unzip -l "$apk" 'lib/arm64-v8a/*.so' || true
            total=$(unzip -l "$apk" 'lib/arm64-v8a/*.so' | grep '\.so$' | awk '{s+=$1} END{print s+0}')
          else
            echo "APK not found; falling back to stripped_native_libs sum"
            dir=$(dirname "$exe")
            total=$(find "$dir" -maxdepth 1 -type f -name '*.so' -exec stat -c%s {} \; | awk '{s+=$1} END{print s+0}')
          fi
          [ "${total:-0}" -gt 0 ] || total=$exe_bytes
          printf "complete: %s bytes (%.2f MB)\n" "$total" "$(echo "scale=2; $total/1048576" | bc)"
          printf '{"os":"android","engine":"%s","graphics":"%s","app":"bn","exe_bytes":%s,"total_bytes":%s}\n' \
            "${{ matrix.engine }}" "${{ matrix.graphics }}" "$exe_bytes" "$total" > size.json

      - name: Upload complete-size marker
        uses: actions/upload-artifact@v4
        with:
          name: size-bn-android-${{ matrix.engine }}-${{ matrix.graphics }}
          path: size.json
          if-no-files-found: error
          retention-days: 14

  # ============================================================
  # Aggregate all artifact sizes into a single Markdown summary.
  # ============================================================
  summary:
    name: summary
    needs:
      - build-win32
      - build-macos
      - build-ios
      - build-ubuntu
      - build-android
      - build-bn-win32
      - build-bn-macos
      - build-bn-ios
      - build-bn-ubuntu
      - build-bn-android
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Build size summary
        shell: bash
        run: |
          set -e
          cat > summary.py <<'PYEOF'
          import os, glob, sys, json

          run_id = sys.argv[1] if len(sys.argv) > 1 else ""
          sha    = sys.argv[2] if len(sys.argv) > 2 else ""

          def first_file(d):
              for root, _, files in os.walk(d):
                  for f in files:
                      return os.path.join(root, f)
              return None

          # key (os, engine, graphics) -> {
          #   'dt': (file, exe_bytes), 'bn': (file, exe_bytes),
          #   'dt_total': int, 'bn_total': int }
          # The 'dt'/'bn' exe size comes from the exe-only artifacts; the
          # *_total "complete deployable size" (executable + JS engine +
          # .so/.dll/.dylib deps, per ABI) comes from the size-* markers.
          rows = {}
          for d in sorted(glob.glob('artifacts/app-*')):
              name = os.path.basename(d)
              parts = name.split('-')
              if len(parts) < 4:
                  continue
              os_, engine, graphics = parts[1], parts[2], '-'.join(parts[3:])
              f = first_file(d)
              if not f:
                  continue
              rows.setdefault((os_, engine, graphics), {})['dt'] = (os.path.basename(f), os.path.getsize(f))

          for d in sorted(glob.glob('artifacts/bn-playground-*')):
              name = os.path.basename(d)
              parts = name.split('-')
              # bn-playground-<os>-<engine>-<graphics>
              if len(parts) < 5:
                  continue
              os_, engine, graphics = parts[2], parts[3], '-'.join(parts[4:])
              f = first_file(d)
              if not f:
                  continue
              rows.setdefault((os_, engine, graphics), {})['bn'] = (os.path.basename(f), os.path.getsize(f))

          # Complete-size markers: artifacts/size-<app>-<os>-<engine>-<graphics>/size.json
          for d in sorted(glob.glob('artifacts/size-*')):
              j = os.path.join(d, 'size.json')
              if not os.path.isfile(j):
                  continue
              try:
                  with open(j, 'r', encoding='utf-8-sig') as fh:
                      data = json.load(fh)
              except Exception as e:
                  print("WARN: failed to parse {}: {}".format(j, e), file=sys.stderr)
                  continue
              os_     = data.get('os'); engine = data.get('engine'); graphics = data.get('graphics')
              app     = data.get('app')
              total   = data.get('total_bytes')
              if not (os_ and engine and graphics and app):
                  continue
              row = rows.setdefault((os_, engine, graphics), {})
              try:
                  total = int(total)
              except (TypeError, ValueError):
                  continue
              row['dt_total' if app == 'dawntest' else 'bn_total'] = total

          def mb(b):
              return "{:.2f} MB".format(b/1048576) if b is not None else "—"

          print("# Build artifact sizes")
          print()
          print("Side-by-side comparison of DawnTest and BabylonNative Playground for each matrix cell.")
          print()
          print("- **exe** — the bare main binary (app.exe / Playground / libdawntest.so / libBabylonNativeJNI.so), stripped.")
          print("- **complete** — the full deployable size per ABI: executable + JS engine + all shipped shared-library dependencies (.dll / .so / .dylib). For Android this is every native library in the arm64-v8a slot of the APK.")
          print()
          print("| OS | Engine | Graphics | DawnTest exe | DawnTest complete | BN exe | BN complete |")
          print("|----|--------|----------|-------------:|------------------:|-------:|------------:|")
          for key in sorted(rows.keys()):
              os_, engine, graphics = key
              entry = rows[key]
              dt = entry.get('dt')
              bn = entry.get('bn')
              dt_size = mb(dt[1]) if dt else "—"
              bn_size = mb(bn[1]) if bn else "—"
              dt_total = mb(entry.get('dt_total'))
              bn_total = mb(entry.get('bn_total'))
              print("| {} | {} | {} | {} | {} | {} | {} |".format(os_, engine, graphics, dt_size, dt_total, bn_size, bn_total))
          print()
          print("_Build run: {} • commit {}_".format(run_id, sha))
          PYEOF
          python3 summary.py "${{ github.run_id }}" "${{ github.sha }}" | tee "$GITHUB_STEP_SUMMARY"

